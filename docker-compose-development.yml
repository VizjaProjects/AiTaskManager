services:
  backend:
    build:
      context: ./DotNetServer
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./DotNetServer/.env
    container_name: ordovita-backend
    networks:
      - ordovita-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8080/health | grep -q ok || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        EXPO_PUBLIC_API_URL: ""
        EXPO_PUBLIC_API_PREFIX: "/api/v1"
    ports:
      - "3000:80"
    container_name: ordovita-frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ordovita-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  ordovita-network:
    driver: bridge
