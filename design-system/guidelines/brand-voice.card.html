<!-- @dsCard group="Brand" viewport="700x170" subtitle="Clear, confident, minimal — no hype, no emoji" name="Voice" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        margin: 0;
        font-family: var(--font-sans);
        background: var(--surface-card);
        color: var(--text-body);
        padding: 22px;
      }
      .row {
        display: flex;
        gap: 28px;
      }
      .col {
        flex: 1;
      }
      .h {
        font-size: 11px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--text-tertiary);
        margin-bottom: 10px;
      }
      .item {
        font-size: 13px;
        line-height: 1.5;
        margin-bottom: 6px;
      }
      .do {
        color: var(--text-body);
      }
      .dont {
        color: var(--text-secondary);
        text-decoration: line-through;
        text-decoration-color: var(--color-critical);
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="col">
        <div class="h">Do</div>
        <div class="item do">“Reduce cognitive load.”</div>
        <div class="item do">“Plan your day with clarity.”</div>
        <div class="item do">“Your premium workspace.”</div>
      </div>
      <div class="col">
        <div class="h">Don't</div>
        <div class="item dont">“🚀 Supercharge your productivity!!”</div>
        <div class="item dont">“The #1 game-changing AI ✨”</div>
        <div class="item dont">“Unlock your potential today!”</div>
      </div>
    </div>
  </body>
</html>
