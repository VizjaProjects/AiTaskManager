<!-- @dsCard group="Spacing" viewport="700x150" subtitle="4px base rhythm scale" name="Spacing scale" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        margin: 0;
        font-family: var(--font-sans);
        background: var(--surface-card);
        color: var(--text-body);
        padding: 20px;
      }
      .row {
        display: flex;
        align-items: flex-end;
        gap: 14px;
      }
      .cell {
        text-align: center;
      }
      .bar {
        background: var(--color-accent-tint-08);
        border: 1px solid var(--color-accent-edge);
        border-radius: var(--radius-sm);
      }
      .label {
        font-size: 11px;
        margin-top: 6px;
        color: var(--text-secondary);
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="cell">
        <div class="bar" style="width: 4px; height: 4px"></div>
        <div class="label">1 · 4</div>
      </div>
      <div class="cell">
        <div class="bar" style="width: 8px; height: 8px"></div>
        <div class="label">2 · 8</div>
      </div>
      <div class="cell">
        <div class="bar" style="width: 12px; height: 12px"></div>
        <div class="label">3 · 12</div>
      </div>
      <div class="cell">
        <div class="bar" style="width: 16px; height: 16px"></div>
        <div class="label">4 · 16</div>
      </div>
      <div class="cell">
        <div class="bar" style="width: 24px; height: 24px"></div>
        <div class="label">6 · 24</div>
      </div>
      <div class="cell">
        <div class="bar" style="width: 32px; height: 32px"></div>
        <div class="label">8 · 32</div>
      </div>
      <div class="cell">
        <div class="bar" style="width: 48px; height: 48px"></div>
        <div class="label">12 · 48</div>
      </div>
    </div>
  </body>
</html>
