<!-- @dsCard group="Spacing" viewport="700x170" subtitle="256px sidebar + centered max-w-5xl content" name="Layout grid" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        margin: 0;
        font-family: var(--font-sans);
        background: var(--surface-page);
        color: var(--text-body);
        padding: 20px;
      }
      .frame {
        display: flex;
        gap: 0;
        height: 120px;
        border: 1px solid var(--border-card);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }
      .side {
        width: 110px;
        background: var(--surface-sidebar);
        border-right: 1px solid var(--border-divider);
        padding: 12px;
        font-size: 11px;
        color: var(--text-secondary);
      }
      .main {
        flex: 1;
        background: var(--surface-page);
        position: relative;
        display: flex;
        justify-content: center;
      }
      .content {
        width: 70%;
        background: var(--surface-card);
        border-left: 1px solid var(--border-card);
        border-right: 1px solid var(--border-card);
      }
      .tag {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 10px;
        color: var(--text-tertiary);
      }
      .side .tag2 {
        position: static;
        transform: none;
        display: block;
        margin-top: 6px;
        color: var(--text-tertiary);
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="side">
        Sidebar
        <div class="tag2">256px fixed</div>
      </div>
      <div class="main">
        <div class="content"></div>
        <div class="tag">
          centered content · max-w-5xl (64rem) · px-6 → md:px-12
        </div>
      </div>
    </div>
  </body>
</html>
