<!-- @dsCard group="Colors" viewport="700x150" subtitle="Borders define cards — not shadows" name="Borders & dividers" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        margin: 0;
        font-family: var(--font-sans);
        background: var(--surface-page);
        color: var(--text-body);
        padding: 20px;
      }
      .row {
        display: flex;
        gap: 14px;
      }
      .cell {
        flex: 1;
      }
      .box {
        height: 60px;
        background: var(--surface-card);
        border-radius: var(--radius-lg);
      }
      .b-default {
        border: 1px solid var(--color-outline-variant);
      }
      .b-strong {
        border: 1px solid var(--color-outline);
      }
      .b-divider {
        border: 1px solid var(--color-border-subtle);
      }
      .label {
        font-size: 11px;
        margin-top: 6px;
        color: var(--text-secondary);
      }
      .hex {
        font-size: 11px;
        color: var(--text-tertiary);
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="cell">
        <div class="box b-default"></div>
        <div class="label">outline-variant · default</div>
        <div class="hex">#e2dfd9 — defines cards</div>
      </div>
      <div class="cell">
        <div class="box b-strong"></div>
        <div class="label">outline · strong</div>
        <div class="hex">#c8c4be</div>
      </div>
      <div class="cell">
        <div class="box b-divider"></div>
        <div class="label">border-subtle · divider</div>
        <div class="hex">#eceae6</div>
      </div>
    </div>
  </body>
</html>
