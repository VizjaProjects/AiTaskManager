<!-- @dsCard group="Spacing" viewport="700x160" subtitle="Small radii — nothing over 10px except pills" name="Radius scale" -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      body {
        margin: 0;
        font-family: var(--font-sans);
        background: var(--surface-card);
        color: var(--text-body);
        padding: 20px;
      }
      .row {
        display: flex;
        gap: 18px;
        align-items: flex-end;
      }
      .cell {
        text-align: center;
      }
      .box {
        width: 64px;
        height: 56px;
        background: var(--color-accent-tint-08);
        border: 1px solid var(--color-accent-edge);
      }
      .pill {
        width: 84px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--color-accent-tint-08);
        border: 1px solid var(--color-accent-edge);
        border-radius: var(--radius-full);
        font-size: 11px;
        color: var(--text-accent);
      }
      .label {
        font-size: 11px;
        margin-top: 6px;
        color: var(--text-secondary);
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="cell">
        <div class="box" style="border-radius: var(--radius-sm)"></div>
        <div class="label">sm · 4</div>
      </div>
      <div class="cell">
        <div class="box" style="border-radius: var(--radius-md)"></div>
        <div class="label">md · 6</div>
      </div>
      <div class="cell">
        <div class="box" style="border-radius: var(--radius-lg)"></div>
        <div class="label">lg · 8</div>
      </div>
      <div class="cell">
        <div class="box" style="border-radius: var(--radius-xl)"></div>
        <div class="label">xl · 10</div>
      </div>
      <div class="cell">
        <div class="pill">pill</div>
        <div class="label">full</div>
      </div>
    </div>
  </body>
</html>
