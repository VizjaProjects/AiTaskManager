server:
  forward-headers-strategy: native

spring:
  application:
    name: ordovita
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

  mail:
    host: ${MAIL_HOST}
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false
    show-sql: true

cors:
  allowed-origins: http://localhost:5173, http://localhost, http://localhost:8081, http://localhost:19006, http://localhost:3000
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000
  issuer: auth-service
  audience: auth-service-users

path:
  email-template: templates/identity

ai:
  provider: ${AI_PROVIDER:groq}
  gemini:
    api-key: ${GEMINI_API_KEY:none}
    model: gemma-4-26b-a4b-it
  groq:
    api-key: ${GROQ_API_KEY:none}
    model: openai/gpt-oss-120b

oauth2:
  frontend-url: ${OAUTH2_FRONTEND_URL:http://localhost:3000}
