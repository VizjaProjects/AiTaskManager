name: Ordovita — Build, Publish & Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy.yml"
      - "DotNetServer/**"
      - "docker-compose-prod.yml"
      - "client/app/**"
      - "client/components/**"
      - "client/lib/**"
      - "client/electron/**"
      - "client/assets/**"
      - "client/package.json"
      - "client/package-lock.json"
      - "client/Dockerfile"
      - "client/nginx.conf"
      - "client/tailwind.config.js"
      - "client/tsconfig.json"
      - "docker-compose-prod.yml"

jobs:
  # ── 1. Detect what changed ──
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - '.github/workflows/deploy.yml'
              - 'client/app/**'
              - 'client/components/**'
              - 'client/lib/**'
              - 'client/electron/**'
              - 'client/assets/**'
              - 'client/package.json'
              - 'client/package-lock.json'
              - 'client/Dockerfile'
              - 'client/nginx.conf'
              - 'client/tailwind.config.js'
              - 'client/tsconfig.json'
            backend:
              - '.github/workflows/deploy.yml'
              - 'DotNetServer/**'
            compose:
              - 'docker-compose-prod.yml'

  # ── 2. Build Windows desktop installer ──
  build-desktop:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./client
        run: npm ci --legacy-peer-deps

      - name: Build Windows installer
        working-directory: ./client
        run: npm run desktop:dist

      - name: Prepare installer artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path client/downloads | Out-Null
          $installer = Get-ChildItem "client/desktop-dist" -Filter "Ordovita Setup *.exe" | Select-Object -First 1
          if (-not $installer) { throw "Installer not found in client/desktop-dist" }
          Copy-Item $installer.FullName "client/downloads/Ordovita-Setup.exe"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ordovita-windows-installer
          path: client/downloads/Ordovita-Setup.exe
          if-no-files-found: error
          retention-days: 14

  # ── 3. Build macOS desktop DMG ──
  build-desktop-macos:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./client
        run: npm ci --legacy-peer-deps

      - name: Build macOS DMG
        working-directory: ./client
        run: npm run desktop:dist:mac

      - name: Prepare macOS artifact
        shell: bash
        run: |
          mkdir -p client/downloads
          installer="$(find client/desktop-dist -maxdepth 1 -name 'Ordovita-macOS-arm64.dmg' -print -quit)"
          if [ -z "$installer" ]; then installer="$(find client/desktop-dist -maxdepth 1 -name '*.dmg' -print -quit)"; fi
          if [ -z "$installer" ]; then echo "macOS DMG not found in client/desktop-dist" >&2; exit 1; fi
          cp "$installer" client/downloads/Ordovita-macOS-arm64.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ordovita-macos-arm64-dmg
          path: client/downloads/Ordovita-macOS-arm64.dmg
          if-no-files-found: error
          retention-days: 14

  # ── 4. Build & push frontend image ──
  build-frontend:
    needs: [changes, build-desktop, build-desktop-macos]
    if: |
      needs.changes.outputs.frontend == 'true' &&
      needs.build-desktop.result == 'success' &&
      needs.build-desktop-macos.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: ordovita-windows-installer
          path: client/downloads

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: ordovita-macos-arm64-dmg
          path: client/downloads

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          build-args: |
            EXPO_PUBLIC_API_URL=
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ordovita-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/ordovita-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  # ── 5. Build & push backend image (.NET) ──
  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore and build
        working-directory: ./DotNetServer
        run: |
          dotnet restore DotNetServer.sln
          dotnet build DotNetServer.sln -c Release --no-restore

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./DotNetServer
          file: ./DotNetServer/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ordovita-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/ordovita-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  # ── 6. Deploy to VPS ──
  deploy:
    needs: [changes, build-desktop, build-desktop-macos, build-frontend, build-backend]
    if: |
      always() &&
      (needs.build-desktop.result == 'success' || needs.build-desktop.result == 'skipped') &&
      (needs.build-desktop-macos.result == 'success' || needs.build-desktop-macos.result == 'skipped') &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped') &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped') &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.compose == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose-prod.yml"
          target: "/home/${{ secrets.VPS_USERNAME }}/ordovita"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            echo "${{ secrets.DOCKER_TOKEN }}" | docker login docker.io -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            cd /home/${{ secrets.VPS_USERNAME }}/ordovita

            export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            export DB_URL="${{ secrets.DB_URL }}"
            export DB_USERNAME="${{ secrets.DB_USERNAME }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export MAIL_HOST="${{ secrets.MAIL_HOST }}"
            export MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}"
            export MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}"
            export GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}"
            export GROQ_API_KEY="${{ secrets.GROQ_API_KEY }}"
            export AI_PROVIDER="${{ secrets.AI_PROVIDER }}"
            export GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
            export GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"
            export CRYPTO_SECRET_KEY="${{ secrets.CRYPTO_SECRET_KEY }}"
            export OAUTH2_FRONTEND_URL="https://ordovita.pl"
            export OAUTH2_DESKTOP_BROWSER_CALLBACK_URL="https://ordovita.pl/desktop-oauth-complete"

            docker pull ${{ secrets.DOCKER_USERNAME }}/ordovita-frontend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/ordovita-backend:latest

            docker compose -f docker-compose-prod.yml up -d --remove-orphans

            docker image prune -f
