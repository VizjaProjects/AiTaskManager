server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location /v1/api/ {
        proxy_pass http://backend:8080/v1/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    location /oauth2/ {
        proxy_pass http://backend:8080/oauth2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /login/oauth2/ {
        proxy_pass http://backend:8080/login/oauth2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        sub_filter_once on;
        sub_filter_types text/html;
        sub_filter '</body>' '<div id="ordovita-public-links" style="width:100%;display:flex;justify-content:center;gap:16px;flex-wrap:wrap;padding:12px 16px;border-top:1px solid rgba(77,65,223,0.16);background:rgba(255,255,255,0.96);font-family:Arial,sans-serif"><span style="color:#2a2555;font-size:14px;line-height:20px">Ordovita - publiczna strona aplikacji</span><a href="https://ordovita.pl/privacy-policy" style="color:#2a2555;font-size:14px;line-height:20px;font-weight:600;text-decoration:none">Polityka prywatnosci</a><a href="https://ordovita.pl/terms-of-service" style="color:#2a2555;font-size:14px;line-height:20px;font-weight:600;text-decoration:none">Regulamin</a></div></body>';
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff";
        add_header X-Frame-Options "DENY";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }
}
